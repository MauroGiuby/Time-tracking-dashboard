<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="stylesheet" href="./variables.css">
  <link rel="stylesheet" href="./style.css">

  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500&display=swap" rel="stylesheet">


  <script defer src="script.js"></script>
  
  <title>Frontend Mentor | Time tracking dashboard</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <section class="activity-tracker">

    <section class="activity-tracker-menu">
      <div class="activity-tracker-owner">
        <img src="./images/image-jeremy.png" alt="Avatar Jeremy" class="activity-tracker-owner-img">
        <div class="activity-tracker-owner-container">
          <p class="activity-tracker-owner-for">
            Report for 
          </p>
          <h1 class="activity-tracker-owner-name">
            Jeremy Robson
          </h1>
        </div>
      </div>
      <div class="activity-tracker-options">
        <button class="activity-tracker-option" data-option="daily">
          Daily
        </button>
        <button class="activity-tracker-option" data-option="weekly">
          Weekly
        </button>
        <button class="activity-tracker-option" data-option="monthly">
          Monthly
        </button>
      </div>
    </section>

    <section class="activity-tracker-activity work">
      <div class="activity-bg">
        <img src="./images/icon-work.svg" alt="">
      </div>
      <div class="activity-info">
        <header class="activity-header">
          <h2 class="activity-name">
            Work
          </h2>
          <button class="activity-options" aria-label="More options">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#BBC0FF" fill-rule="evenodd" xmlns="http://www.w3.org/2000/svg">
              <circle cx="5" cy="12" r="2"/>
              <circle cx="12" cy="12" r="2"/>
              <circle cx="19" cy="12" r="2"/>
            </svg>
          </button>
        </header>
        <div class="activity-timeframes">
          <h3 class="activity-current-timeframes">
            32hrs
          </h3>
          <div class="activity-previous-timeframes">
            <p class="time-window">Last Week</p>
            <p> - </p>
            <p class="time">36hrs</p>
          </div>
        </div>
      </div>
    </section>

    <section class="activity-tracker-activity play">
      <div class="activity-bg">
        <img src="./images/icon-play.svg" alt="">
      </div>
      <div class="activity-info">
        <header class="activity-header">
          <h2 class="activity-name">
            Play
          </h2>
          <button class="activity-options" aria-label="More options">

              <circle cx="12" cy="12" r="2"/>
              <circle cx="19" cy="12" r="2"/>
            </svg>
          </button>
        </header>
        <div class="activity-timeframes">
          <h3 class="activity-current-timeframes">
            10hrs
          </h3>
          <div class="activity-previous-timeframes">
            <p class="time-window">Last Week</p>
            <p> - </p>
            <p class="time">36hrs</p>
          </div>
        </div>
      </div>
    </section>

    <section class="activity-tracker-activity study">
      <div class="activity-bg">
        <img src="./images/icon-study.svg" alt="">

              <circle cx="12" cy="12" r="2"/>
              <circle cx="19" cy="12" r="2"/>

      <div class="activity-info">
        <header class="activity-header">

        </header>
        <div class="activity-timeframes">

  </section>


  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.

</body>
</html>
